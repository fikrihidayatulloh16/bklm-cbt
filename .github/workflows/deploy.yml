name: Monorepo Self-Hosted Deploy

on:
  # push:
  #   branches:
  #     - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Deploy Local Script
        run: |
          TARGET_DIR="/var/www/bklm-cbt"
          
          echo "📂 Copying Files..."
          rsync -av --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.env' \
            --exclude 'node_modules' \
            --exclude 'apps/*/node_modules' \
            --exclude 'db_data' \
            ./ $TARGET_DIR/
          
          cd $TARGET_DIR
          
          # ============================================
          # PERUBAHAN DI SINI: HAPUS SUDO DARI DOCKER
          # ============================================
          
          echo "🐳 Mengecek Konfigurasi Database..."
          # HAPUS 'sudo' di sini 👇
          docker compose up -d --remove-orphans
          
          echo "⏳ Menunggu Database (10s)..."
          sleep 10
          
          echo "📄 Syncing .env..."
          cp .env apps/api/.env
          cp .env apps/web/.env
          
          echo "🛠️ Build API..."
          cd apps/api
          npm install --production=false --legacy-peer-deps
          npx prisma generate
          npx prisma db push
          npm run build
          cd ../..
          
          echo "🛠️ Build WEB..."
          cd apps/web
          npm install --production=false --legacy-peer-deps
          npm run build
          cd ../..

          echo "🚀 Restart PM2..."
          # HAPUS 'npm install -g pm2' (Install manual saja sekali di VPS)
          # Pastikan user fikri16 bisa menjalankan pm2 tanpa sudo
          pm2 reload ecosystem.config.js || pm2 start ecosystem.config.js
          pm2 save

          # 3. Tunggu sebentar (5 detik) agar NestJS sempat booting dan menulis log
          sleep 5

          # 4. Tampilkan Status (Pastikan status 'online')
          pm2 status

          # 5. [SOLUSI] Baca File Log Langsung (Bypass CLI PM2)
          # Ini membaca 30 baris terakhir dari file fisik di harddisk.
          # Pastikan path ini sesuai dengan lokasi log PM2 Anda (biasanya di ~/.pm2/logs/)
          echo "📄 Reading latest logs..."
          tail -n 30 /home/fikri16/.pm2/logs/bklm-api-out.log || echo "⚠️ Log file not found, skipping..."

          # 6. [REKOMENDASI] Health Check via CURL
          # Ini jauh lebih akurat daripada baca log. Kalau ini sukses, berarti server PASTI jalan.
          echo "🚀 Checking API Health..."
          curl --fail --max-time 10 http://localhost:3001/api/health || echo "⚠️ Health Check Failed (Check logs manually)"

          docker restart bklm_promtail

          

          echo "✅ DEPLOY SUCCESSFUL!"
name: Monorepo Self-Hosted Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted # ✅ Benar, jalan di VPS sendiri

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 👇 PERUBAHAN BESAR ADA DI SINI
      # Kita hapus "uses: easingthemes/ssh-deploy" dan "appleboy/ssh-action"
      # Kita ganti dengan script manual (run)
      
      - name: Deploy Local Script
        run: |
          # 1. Definisikan Folder Tujuan
          TARGET_DIR="/var/www/bklm-cbt"
          
          echo "📂 Memulai Copy File Lokal..."
          
          # Kita gunakan RSYNC LOKAL (Antar folder di komputer yang sama)
          # Tidak perlu SSH Key, tidak perlu IP Address
          # ./ artinya folder runner saat ini
          # $TARGET_DIR/ artinya folder tujuan
          rsync -av --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.env' \
            --exclude 'node_modules' \
            --exclude 'apps/*/node_modules' \
            --exclude 'db_data' \
            ./ $TARGET_DIR/
          
          echo "✅ Copy selesai. Pindah ke folder kerja..."
          cd $TARGET_DIR
          
          # ====================================================
          # Mulai Proses Build & Restart (Sama seperti sebelumnya)
          # ====================================================
          
          echo "🐳 Reset Database (Docker)..."
          # Gunakan sudo karena docker butuh root access
          sudo docker compose down
          sudo docker compose up -d
          echo "⏳ Menunggu Database siap (10 detik)..."
          sleep 10
          
          echo "📄 Syncing .env files..."
          # Asumsi file .env induk sudah Anda buat manual di /var/www/bklm-cbt/.env
          # Jika belum ada, script ini akan error. Pastikan file itu ada!
          cp .env apps/api/.env
          cp .env apps/web/.env
          
          echo "🛠️ Building API (NestJS)..."
          cd apps/api
          npm install --production=false
          npx prisma generate
          npx prisma db push
          npm run build
          cd ../..
          
          echo "🛠️ Building WEB (Next.js)..."
          cd apps/web
          npm install --production=false
          npm run build
          cd ../..

          echo "🚀 Restarting Apps via PM2..."
          # Install PM2 global (jaga-jaga kalau belum ada)
          npm install -g pm2
          
          # Start atau Reload
          pm2 reload ecosystem.config.js || pm2 start ecosystem.config.js
          pm2 save
          
          echo "✅ DEPLOY SUCCESSFUL!"
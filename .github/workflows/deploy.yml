name: Monorepo Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # HAPUS langkah build di GitHub Server.
      # Kita akan build langsung di VPS agar lebih aman path-nya untuk monorepo pemula.
      # (Atau kalau mau build di GitHub, scriptnya jadi sangat panjang).
      # Untuk sekarang, kita kirim mentahan kode ke VPS, lalu build disana.
      
      - name: Deploy to VPS (Copy Files)
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ARGS: "-rlgoDzvc -i --delete"
          SOURCE: "."
          TARGET: "/var/www/bklm-cbt"
          REMOTE_HOST: ${{ secrets.HOST }}
          REMOTE_USER: ${{ secrets.USERNAME }}
          # Exclude node_modules di root maupun di dalam apps
          EXCLUDE: "/.git/, /.github/, /.env, node_modules/, apps/*/node_modules/, db_data/"

      - name: Post-Deploy Script (Build & Start)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/bklm-cbt
            
            # 1. Nyalakan Database (Docker)
            echo "🔥 Starting Database..."
            # Kita pakai sudo karena user mungkin butuh akses docker
            sudo docker compose up -d
            sleep 10 # Tunggu DB bangun
            
            # 2. Setup ENVIRONMENT VARIABLES
            # Kita copy .env root ke masing-masing folder apps
            # Agar API dan WEB bisa baca config DB/Auth
            echo "📄 Syncing .env files..."
            cp .env apps/api/.env
            cp .env apps/web/.env
            
            # 3. Build BACKEND (API)
            echo "🛠️ Building API..."
            cd apps/api
            npm install --production=false # Install devDependencies juga buat build (NestJS butuh CLI)
            npx prisma generate            # Generate Client Prisma
            npx prisma db push             # Sync Schema ke DB
            npm run build                  # Build NestJS -> dist/
            cd ../..                       # Kembali ke root
            
            # 4. Build FRONTEND (WEB)
            echo "🛠️ Building WEB..."
            cd apps/web
            npm install --production=false
            npm run build                  # Build Next.js -> .next/
            cd ../..                       # Kembali ke root

            # 5. Start Semua dengan PM2 Ecosystem
            echo "🚀 Launching Apps..."
            # Install PM2 jika belum ada
            npm install -g pm2
            
            # Jalankan konfigurasi ecosystem
            pm2 start ecosystem.config.js
            pm2 save
            
            echo "✅ Deploy Monorepo Selesai!"
name: Monorepo Self-Hosted Deploy (Docker)

on:
  # push:
  #   branches:
  #     - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Setup Node.js TIDAK LAGI DIBUTUHKAN di sini karena sudah ditangani di dalam Dockerfile!

      - name: Deploy & Build via Docker
        run: |
          TARGET_DIR="/var/www/bklm-cbt"
          
          echo "📂 Copying Files to Target Directory..."
          rsync -av --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.env' \
            --exclude 'db_data' \
            ./ $TARGET_DIR/
          
          cd $TARGET_DIR
          
          echo "📄 Syncing .env to containers..."
          # Pastikan .env utama di $TARGET_DIR sudah ada dan benar
          cp .env apps/api/.env || true
          cp .env apps/web/.env || true
          
          echo "🐳 Build & Restart Docker Containers..."
          # 🚨 INI ADALAH INTI DARI SEGALANYA
          # --build akan memaksa Docker membaca ulang kode baru Anda dan menjalankan npm run build di dalam container
          docker compose up -d --build --remove-orphans
          
          echo "⏳ Menunggu API Container Booting & Prisma Migrate (15s)..."
          sleep 15
          
          echo "🚀 Checking API Health via Nginx/Docker..."
          # Karena Nginx sekarang memegang port 80, kita test ke localhost:80/api/health
          # Atau test langsung ke container api internal jika Anda mengekspos port sementara
          curl --fail --max-time 10 http://localhost/api/health || echo "⚠️ Health Check Failed (Check docker logs instrumen-api)"

          # (Opsional) Restart promtail jika Anda sudah menyalakannya
          docker restart bklm_promtail

          echo "✅ DEPLOY SUCCESSFUL!"
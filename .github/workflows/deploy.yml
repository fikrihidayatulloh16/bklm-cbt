name: Monorepo Deploy

on:
  # Kita aktifkan DUA trigger sekaligus
  push:
    branches:
      - master      =
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy to VPS
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ARGS: "-rlgoDzvc -i --delete"
          SOURCE: "."
          TARGET: "/var/www/bklm-cbt"
          REMOTE_HOST: ${{ secrets.HOST }}
          REMOTE_USER: ${{ secrets.USERNAME }}
          # Exclude lengkap
          EXCLUDE: "/.git/, /.github/, /.env, node_modules/, apps/*/node_modules/, db_data/"

      - name: Post-Deploy Script
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/bklm-cbt
            
            echo "🔥 Starting Database..."
            # Matikan container lama biar bersih (opsional tapi aman)
            sudo docker compose down
            # Nyalakan lagi
            sudo docker compose up -d
            sleep 15
            
            echo "📄 Syncing .env files..."
            cp .env apps/api/.env
            cp .env apps/web/.env
            
            echo "🛠️ Building API..."
            cd apps/api
            npm install --production=false
            npx prisma generate
            npx prisma db push
            npm run build
            cd ../..
            
            echo "🛠️ Building WEB..."
            cd apps/web
            npm install --production=false
            npm run build
            cd ../..

            echo "🚀 Launching Apps..."
            npm install -g pm2
            pm2 start ecosystem.config.js
            pm2 save
            
            echo "✅ Deploy Selesai!"

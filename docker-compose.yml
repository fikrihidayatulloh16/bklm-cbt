services:
  # # ------------JADIKAN KOMENTAR SAAT DEVELOPEMTN, Konfigurasi untuk production
  # # ------------Service ini Konfigurasi untuk production
  nginx:
    image: nginx:alpine
    ports:
      - "80:80" # Nginx mengekspos port 80 ke laptop/server Anda (10.10.10.3)
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - api
    restart: unless-stopped

  postgres_db:
    image: postgres:15-alpine
    container_name: bk-assessment-db
    restart: always
    # Gunakan .env dari root project saja (lebih aman karena file ini pasti ada di VPS)
    env_file:
      - .env 
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          memory: 256M
    ports:
      - "5432:5432"
    volumes:
      # ✅ PERBAIKAN: Gunakan folder di root, bukan di dalam apps/api
      - ./db_data/postgres:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: bklm_redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    deploy:
      resources:
        limits:
          memory: 128M # Redis sangat ringan
        reservations:
          memory: 64M
    ports:
      - 6379:6379
    volumes:
      # ✅ PERBAIKAN: Gunakan folder mount agar data redis juga aman
      - ./db_data/redis:/data
    restart: always

  # ==========================================
  # 2. APPLICATION LAYER (Akan di-build via Dockerfile)
  # ==========================================
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: bklm_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # 🚨 INI DIA MASTERPIECE-NYA:
      # Kita mengubah host menjadi 'postgres_db', tapi password-nya 
      # kita tarik secara dinamis dari file .env!
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres_db:5432/${POSTGRES_DB}?schema=public
      
      # Menimpa localhost menjadi nama container Redis
      - REDIS_HOST=redis
    ports:
      - "3000:3000"
    depends_on:
      - postgres_db
      - redis
    deploy:
      resources:
        limits:
          memory: 384M # NestJS cukup berat, butuh ruang lebih
        reservations:
          memory: 128M

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: bklm_web
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - api
    deploy:
      resources:
        limits:
          memory: 384M # Next.js (SSR) butuh memori untuk render halaman
        reservations:
          memory: 128M

  loki:
    image: grafana/loki:2.9.0
    container_name: bklm_loki
    # ports:
    #   - 3100:3100
    command: -config.file=/etc/loki/local-config.yaml
    deploy:
      resources:
        limits:
          memory: 512M # Loki mengunyah banyak log, butuh ruang lebih besar
        reservations:
          memory: 256M
    volumes: 
      - loki_data:/loki
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.0
    container_name: bklm_promtail
    deploy:
      resources:
        limits:
          memory: 128M # Promtail sangat ringan, hanya membaca file dan mengirimkannya
        reservations:
          memory: 64M
    volumes: 
      - ./monitoring/promtail-config.yaml:/etc/promtail/config.yml
      # Mounting logs agar bisa dibaca
      - ./apps/api/logs:/var/log/app
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:latest
    container_name: bklm_grafana
    deploy:
      resources:
        limits:
          memory: 256M # Grafana butuh RAM untuk merender UI Dashboard
        reservations:
          memory: 128M
    # ports:
    #   - 3002:3000
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    depends_on: 
      - loki

volumes:
  loki_data:
  grafana_data:
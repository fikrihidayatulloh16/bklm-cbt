version: '3.8'

services:
  postgres_db:
    image: postgres:15-alpine
    container_name: bk-assessment-db
    restart: always
    # Gunakan .env dari root project saja (lebih aman karena file ini pasti ada di VPS)
    env_file:
      - .env 
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          memory: 128M
    ports:
      - "5432:5432"
    volumes:
      # ✅ PERBAIKAN: Gunakan folder di root, bukan di dalam apps/api
      - ./db_data/postgres:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: bklm_redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - 6379:6379
    volumes:
      # ✅ PERBAIKAN: Gunakan folder mount agar data redis juga aman
      - ./db_data/redis:/data
    restart: always

  loki:
    image: grafana/loki:2.9.0
    container_name: bklm_loki
    ports:
      - 3100:3100
    command: -config.file=/etc/loki/local-config.yaml
    volumes: 
      - loki_data:/loki
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.0
    container_name: bklm_promtail
    volumes: 
      - ./monitoring/promtail-config.yaml:/etc/promtail/config.yml
      # Mounting logs agar bisa dibaca
      - ./logs:/var/log/app
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:latest
    container_name: bklm_grafana
    ports:
      - 3002:3000
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    depends_on: 
      - loki

volumes:
  loki_data:
  grafana_data:
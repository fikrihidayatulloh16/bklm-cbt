# docker-compose.yml
version: '3.8'

services:

  # --- Service untuk postgres ---
  postgres_db:
    image: postgres:15-alpine
    container_name: bk-assessment-db

    env_file:
      - ./apps/api/.env
    
    restart: always

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    deploy:
      resources:
        limits:
          cpus: '0.50'    # Batasi CPU usage max 50%
          memory: 512M    # Batasi RAM max 512MB (Sangat cukup untuk dev)
        reservations:
          memory: 128M    # Garansi minimal 128MB tersedia

    ports:
      - "5432:5432"

    volumes:
      - ./pgdata_clean:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: bklm_redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - 6379:6379
    volumes:
      - redis_data:/data
    restart: always

  loki:
    image: grafana/loki:2.9.0
    container_name: bklm_loki
    ports:
      - 3100:3100
    command: -config.file=/etc/loki/local-config.yaml
    volumes: 
      - loki_data:/loki
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.0
    container_name: bklm_promtail
    volumes: 
      # Mount promtail yang sudah dibuat
      - ./monitoring/promtail-config.yaml:/etc/promtail/config.yml
      # 
      - ./apps/api/logs:/var/log/app
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:latest
    container_name: bklm_grafana
    
    ports:
      - 3002:3000
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    depends_on: 
      - loki

volumes:
  redis_data:
  loki_data:
  grafana_data:
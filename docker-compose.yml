# docker-compose.yml
version: '3.8'

services:
  postgres_db:
    image: postgres:15-alpine
    container_name: bk-assessment-db

    env_file:
      - ./apps/api/.env
    
    restart: always

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    deploy:
      resources:
        limits:
          cpus: '0.50'    # Batasi CPU usage max 50%
          memory: 512M    # Batasi RAM max 512MB (Sangat cukup untuk dev)
        reservations:
          memory: 128M    # Garansi minimal 128MB tersedia

    ports:
      - "5432:5432"

    volumes:
      - ./pgdata_clean:/var/lib/postgresql/data